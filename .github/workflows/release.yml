name: Release Go Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Build
        run: go build -ldflags="-X main.version=${{ github.ref_name }}" -o hubfly-builder ./cmd/hubfly-builder

      - name: Prepare Release Bundle
        run: |
          mkdir -p dist/configs
          cp hubfly-builder dist/
          cp configs/buildkitd.toml dist/configs/
          cd dist
          zip -r ../hubfly-builder-linux-amd64.zip hubfly-builder configs

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            ./hubfly-builder-linux-amd64.zip
